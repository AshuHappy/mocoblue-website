<!DOCTYPE html>
<html>
<head>
  <title>Mocoblue - Bulk Candy Supplier</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #fff;
      text-align: center;
    }
    header {
      background: #ffcc00;
      padding: 40px;
    }
    h1 {
      margin: 0;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      padding: 20px;
    }
    .card {
      border-radius: 15px;
      padding: 15px;
      background: #f9f9f9;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .brands {
      padding: 20px;
    }
    .brand-box {
      display: inline-block;
      margin: 10px;
      padding: 10px 20px;
      background: #eee;
      border-radius: 10px;
    }
    .cta {
      margin: 30px;
    }
    .btn {
      background: green;
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  <h1>🍬 Mocoblue</h1>
  <p>Bulk Candy Supplier | High Margin Products</p>
</header>

<section class="products">
  <div class="card">Mango Candy</div>
  <div class="card">Imli Candy</div>
  <div class="card">Cola Candy</div>
  <div class="card">Strawberry Candy</div>
</section>

<section class="brands">
  <h2>Brands We Deal In</h2>
  <div class="brand-box">Sweetking</div>
  <div class="brand-box">Chintoo</div>
  <div class="brand-box">Others</div>
</section>

<div class="cta">
  <a href="https://wa.me/91XXXXXXXXXX" class="btn">
    Enquire on WhatsApp
  </a>
</div>

</body>
</html>
