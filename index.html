<!DOCTYPE html>
<html>

      text-align: center;
    }

    header {
      background: linear-gradient(135deg, #ffcc00, #ff6600);
      padding: 40px 20px;
      color: white;
    }

    header img {
      width: 120px;
      margin-top: 15px;

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));

    .card {

      border-radius: 15px;
      padding: 15px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .brand-box {
      display: inline-block;
      margin: 10px;
      padding: 10px 20px;
      background: #eee;
      border-radius: 10px;
      font-weight: bold;
    }

    .btn {
      background: green;
      color: white;
      padding: 15px 25px;
      border-radius: 10px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
