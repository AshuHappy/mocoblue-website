<!DOCTYPE html>
<html>
<head>
  <title>Mocoblue - Bulk Candy Supplier</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #fff;
      text-align: center;
    }

    header {
      background: linear-gradient(135deg, #ffcc00, #ff6600);
      padding: 50px 20px;
      color: white;
    }

    header h1 {
      margin: 0;
      font-size: 36px;
    }

    header p {
      font-size: 18px;
    }

    .cartoon {
      font-size: 50px;
      margin-top: 10px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .card {
      border-radius: 20px;
      padding: 20px;
      background: #f9f9f9;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .brands {
      padding: 30px;
    }

    .brand-box {
      display: inline-block;
      margin: 10px;
      padding: 12px 25px;
      background: #eee;
      border-radius: 15px;
      font-weight: bold;
    }

    .cta {
      margin: 40px;
    }

    .btn {
      background: green;
      color: white;
      padding: 15px 25px;
      border-radius: 15px;
      text-decoration: none;
      font-size: 16px;
    }
  </style>
</head>

<body>

<header>
  <h1>🍬 Mocoblue</h1>
  <p>Fun Candies | Bulk Supply | High Margin</p>
  <div class="cartoon">🍭🍫🍬</div>
</header>

<section class="products">
  <div class="card">🍭 Mango Candy</div>
  <div class="card">🍬 Imli Candy</div>
  <div class="card">🥤 Cola Candy</div>
  <div class="card">🍓 Strawberry Candy</div>
</section>

<section class="brands">
  <h2>Brands We Deal In</h2>
  <div class="brand-box">Sweetking</div>
  <div class="brand-box">Chintoo</div>
  <div class="brand-box">Others</div>
</section>

<div class="cta">
  <a href="https://wa.me/91XXXXXXXXXX" class="btn">
    🍬 Enquire on WhatsApp
  </a>
</div>

</body>
</html>
